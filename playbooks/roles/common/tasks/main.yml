---
- name: Ensure UFW is installed (Debian/Ubuntu)
  apt:
    name: ufw
    state: present
  when: ansible_os_family == 'Debian'

- name: Ensure firewalld is installed (RHEL/AlmaLinux)
  dnf:
    name: firewalld
    state: present
  when: ansible_os_family == 'RedHat'

- name: Allow OpenSSH traffic
  ufw:
    rule: allow
    name: OpenSSH
  when: ansible_os_family == 'Debian'

- name: Allow HTTP/HTTPS traffic
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
  when: ansible_os_family == 'Debian'

- name: Enable Firewall
  ufw:
    state: enabled
  when: ansible_os_family == 'Debian'
